<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Split Calculator</title>

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0e1015">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Split">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #08090c;
    --bg-card: #0e1015;
    --bg-elevated: #141720;
    --border: #1c1f2a;
    --border-hover: #2a2f3d;
    --text-primary: #e8eaf0;
    --text-secondary: #6b7084;
    --text-muted: #3d4155;
    --accent-gold: #c9a84c;
    --accent-gold-dim: #8a7234;
    --accent-gold-glow: rgba(201, 168, 76, 0.08);
    --accent-us: #5b8af5;
    --accent-us-dim: rgba(91, 138, 245, 0.12);
    --accent-intl: #8b6cf5;
    --accent-intl-dim: rgba(139, 108, 245, 0.10);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: -webkit-fill-available; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    padding-top: max(20px, env(safe-area-inset-top));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.15;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, var(--accent-gold-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .header-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--accent-gold-glow);
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 16px;
  }

  .header-tag::before {
    content: '';
    width: 5px;
    height: 5px;
    background: var(--accent-gold);
    border-radius: 50%;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  h1 em { font-style: italic; color: var(--accent-gold); }

  .input-section {
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
  }

  .input-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: block;
  }

  .input-container {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.3s, box-shadow 0.3s;
    overflow: hidden;
  }

  .input-container:focus-within {
    border-color: var(--accent-gold-dim);
    box-shadow: 0 0 0 3px var(--accent-gold-glow), 0 8px 32px rgba(0,0,0,0.3);
  }

  .currency-sign {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-muted);
    transition: color 0.3s;
    pointer-events: none;
  }

  .input-container:focus-within .currency-sign { color: var(--accent-gold-dim); }

  input[type="text"] {
    width: 100%;
    padding: 20px 18px 20px 38px;
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    background: transparent;
    border: none;
    color: var(--text-primary);
    outline: none;
    letter-spacing: -0.02em;
  }

  input::placeholder { color: var(--text-muted); }

  /* Results */
  .results {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    max-height: 0;
    overflow: hidden;
    transition:
      opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      margin-top 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }

  .results.visible {
    opacity: 1;
    transform: translateY(0);
    max-height: 700px;
    pointer-events: all;
  }

  /* Fund card */
  .fund-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.3s;
    overflow: hidden;
  }

  .fund-card.us { border-left: 3px solid var(--accent-us); }
  .fund-card.intl { border-left: 3px solid var(--accent-intl); }

  .fund-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px 12px 20px;
  }

  .fund-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .fund-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .fund-card.us .fund-icon { background: var(--accent-us-dim); color: var(--accent-us); }
  .fund-card.intl .fund-icon { background: var(--accent-intl-dim); color: var(--accent-intl); }

  .fund-details { display: flex; flex-direction: column; gap: 2px; }

  .fund-name { font-size: 15px; font-weight: 500; color: var(--text-primary); letter-spacing: 0.01em; }

  .fund-desc-primary {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
    line-height: 1.3;
  }

  .fund-desc-secondary {
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.35;
    margin-top: 1px;
  }

  .fund-amount {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  /* Copy row inside each card */
  .copy-row {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px 20px;
  }

  .copy-chip {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .copy-chip:hover {
    border-color: var(--border-hover);
    background: var(--bg-card);
  }

  .copy-chip:active { transform: scale(0.97); }

  .copy-chip.copied {
    border-color: rgba(74, 222, 128, 0.3);
    color: #4ade80;
    background: rgba(74, 222, 128, 0.05);
  }

  .copy-chip svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .copy-chip .chip-label {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Summary */
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  .summary-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .summary-value .check { color: #4ade80; margin-right: 4px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body {
      padding: 0;
      justify-content: stretch;
      align-items: stretch;
    }
    .container {
      width: 100%;
      max-width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    .header { order: 1; margin-top: auto; margin-bottom: 0; }
    .results { order: 2; margin-top: auto; }
    .results.visible { margin-top: auto; }
    .input-section { order: 3; margin-top: 16px; }
    h1 { font-size: 28px; }
    input[type="text"] { font-size: 22px; padding: 18px 16px 18px 36px; }
    .fund-amount { font-size: 18px; }
    .fund-card-top { padding: 14px 16px 10px 16px; }
    .copy-row { padding: 0 16px 12px 16px; }
    .currency-sign { left: 16px; font-size: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-tag">Fidelity Zero Funds</div>
    <h1>Split <em>Calculator</em></h1>
  </div>

  <div class="input-section">
    <label class="input-label" for="amount">Amount to invest</label>
    <div class="input-container">
      <span class="currency-sign">$</span>
      <input type="text" id="amount" inputmode="decimal" placeholder="0.00" autocomplete="off" autofocus>
    </div>
  </div>

  <div class="results" id="results">
    <!-- FZROX Card -->
    <div class="fund-card us">
      <div class="fund-card-top">
        <div class="fund-info">
          <div class="fund-icon">70%</div>
          <div class="fund-details">
            <span class="fund-name">FZROX</span>
            <span class="fund-desc-primary">Fidelity ZERO Total Market</span>
            <span class="fund-desc-secondary">All US stocks &middot; large, mid, small cap</span>
          </div>
        </div>
        <span class="fund-amount" id="fzrox-amt">$0.00</span>
      </div>
      <div class="copy-row">
        <button class="copy-chip" data-copy="symbol" data-fund="fzrox" title="Copy symbol">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span class="chip-label">Symbol</span> FZROX
        </button>
        <button class="copy-chip" data-copy="amount" data-fund="fzrox" title="Copy amount">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span class="chip-label">Amount</span> <span class="chip-value" id="fzrox-chip">$0.00</span>
        </button>
      </div>
    </div>

    <!-- FZILX Card -->
    <div class="fund-card intl">
      <div class="fund-card-top">
        <div class="fund-info">
          <div class="fund-icon">30%</div>
          <div class="fund-details">
            <span class="fund-name">FZILX</span>
            <span class="fund-desc-primary">Fidelity ZERO International</span>
            <span class="fund-desc-secondary">Non-US stocks &middot; developed + emerging</span>
          </div>
        </div>
        <span class="fund-amount" id="fzilx-amt">$0.00</span>
      </div>
      <div class="copy-row">
        <button class="copy-chip" data-copy="symbol" data-fund="fzilx" title="Copy symbol">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span class="chip-label">Symbol</span> FZILX
        </button>
        <button class="copy-chip" data-copy="amount" data-fund="fzilx" title="Copy amount">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span class="chip-label">Amount</span> <span class="chip-value" id="fzilx-chip">$0.00</span>
        </button>
      </div>
    </div>

    <div class="summary-row">
      <span class="summary-label">Total</span>
      <span class="summary-value"><span class="check">&check;</span> <span id="total-amt">$0.00</span></span>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('amount');
const results = document.getElementById('results');
const fzroxEl = document.getElementById('fzrox-amt');
const fzilxEl = document.getElementById('fzilx-amt');
const fzroxChip = document.getElementById('fzrox-chip');
const fzilxChip = document.getElementById('fzilx-chip');
const totalEl = document.getElementById('total-amt');

// Store raw numeric values for copying without $ sign
let fzroxRaw = '';
let fzilxRaw = '';

function fmt(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function fmtRaw(cents) {
  return (cents / 100).toFixed(2);
}

function calculate() {
  const raw = input.value.replace(/[^0-9.]/g, '');
  const val = parseFloat(raw);

  if (!val || val <= 0) {
    results.classList.remove('visible');
    return;
  }

  const totalCents = Math.round(val * 100);
  const fzroxCents = Math.round(totalCents * 0.70);
  const fzilxCents = totalCents - fzroxCents;

  fzroxRaw = fmtRaw(fzroxCents);
  fzilxRaw = fmtRaw(fzilxCents);

  fzroxEl.textContent = fmt(fzroxCents);
  fzilxEl.textContent = fmt(fzilxCents);
  fzroxChip.textContent = fmt(fzroxCents);
  fzilxChip.textContent = fmt(fzilxCents);
  totalEl.textContent = fmt(totalCents);
  results.classList.add('visible');
}

input.addEventListener('input', calculate);
input.addEventListener('focus', () => input.select());

// Individual copy chips
const copyIconSvg = '<rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
const checkIconSvg = '<polyline points="20 6 9 17 4 12"></polyline>';

function flashCopied(btn) {
  btn.classList.add('copied');
  btn.querySelector('svg').innerHTML = checkIconSvg;
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.querySelector('svg').innerHTML = copyIconSvg;
  }, 1500);
}

document.querySelectorAll('.copy-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.copy;
    const fund = btn.dataset.fund;
    let text = '';

    if (type === 'symbol') {
      text = fund.toUpperCase();
    } else {
      text = fund === 'fzrox' ? fzroxRaw : fzilxRaw;
    }

    navigator.clipboard.writeText(text).then(() => flashCopied(btn));
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
